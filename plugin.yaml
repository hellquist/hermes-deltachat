name: deltachat
label: Delta Chat
kind: platform
version: 1.0.0
description: Delta Chat platform adapter for Hermes — E2EE messaging over email (Autocrypt)
author: hellquist
requires_env:
  - name: DELTACHAT_ADDR
    description: "Delta Chat / chatmail email address"
    prompt: "Email address"
    password: false
  - name: DELTACHAT_PASSWORD
    description: "Delta Chat / chatmail password"
    prompt: "Password"
    password: true
optional_env:
  - name: DELTACHAT_HOME_CHANNEL
    description: "Default channel for cron delivery (your email address)"
    password: false
